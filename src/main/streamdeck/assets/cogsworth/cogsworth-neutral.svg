<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .gear { fill: #e0e0e0; }
      .face { fill: #0d0d0d; }
    </style>
  </defs>

  <!-- Background (transparent in prod, dark for preview) -->
  <rect width="512" height="512" fill="#0d0d0d" rx="32"/>

  <!-- Gear body -->
  <g transform="translate(256, 256)">
    <!-- Outer gear ring with 8 teeth -->
    <path class="gear" d="
      M -30,-185 L 30,-185 L 35,-155 Q 65,-150 90,-135
      L 110,-160 L 155,-110 L 135,-90 Q 150,-65 155,-35
      L 185,-30 L 185,30 L 155,35 Q 150,65 135,90
      L 155,110 L 110,155 L 90,135 Q 65,150 35,155
      L 30,185 L -30,185 L -35,155 Q -65,150 -90,135
      L -110,160 L -155,110 L -135,90 Q -150,65 -155,35
      L -185,30 L -185,-30 L -155,-35 Q -150,-65 -135,-90
      L -155,-110 L -110,-155 L -90,-135 Q -65,-150 -35,-155
      Z
    "/>

    <!-- Center hole (cutout for face area) -->
    <circle class="face" cx="0" cy="0" r="85"/>

    <!-- Inner ring (gives depth to the gear) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#e0e0e0" stroke-width="6" opacity="0.3"/>

    <!-- === FACE === -->

    <!-- Left eye -->
    <circle class="gear" cx="-28" cy="-15" r="12"/>

    <!-- Right eye -->
    <circle class="gear" cx="28" cy="-15" r="12"/>

    <!-- Mouth (neutral — straight line) -->
    <line x1="-20" y1="28" x2="20" y2="28" stroke="#e0e0e0" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
